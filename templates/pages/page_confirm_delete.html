{% extends 'base.html' %}

{% block title %}Borrar entrada{% endblock %}

{% block content %}
<h2>Borrar entrada</h2>
<hr>
<p>¿Estás segura de que querés borrar la entrada <strong>{{ page.title }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, borrar</button>
    <a href="{% url 'page-list' %}" class="btn btn-secondary ms-2">Cancelar</a>
</form>
{% endblock %}
