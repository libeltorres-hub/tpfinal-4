{% extends 'base.html' %}

{% block title %}Ingresar{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2>Ingresar</h2>
        <hr>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
        <p class="mt-3">¿No tenés cuenta? <a href="{% url 'signup' %}">Registrate aquí</a></p>
    </div>
</div>
{% endblock %}
